<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Aurora Glass</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Manrope:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="04.css" />
  </head>
  <body>
    <nav class="back-nav-wrapper">
      <a href="#" class="back-link">← BACK</a>
    </nav>

    <main class="checkout-container">
      <header>
        <h1 class="checkout-title">Checkout</h1>
      </header>

      <section
        class="content-card mb-3 d-flex justify-content-between align-items-center"
      >
        <div>
          <span
            class="text-muted small fw-bold text-uppercase"
            style="letter-spacing: 1px"
            >Delivery Address</span
          >
          <p class="mb-0 fw-bold">123 Lake Street, District 2</p>
        </div>
        <button
          class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold"
          style="font-size: 0.75rem"
        >
          Edit
        </button>
      </section>

      <section class="content-card mb-3">
        <h2 class="h6 fw-bold mb-3 text-uppercase" style="letter-spacing: 1px">
          Your Order
        </h2>

        <div class="item-card">
          <div class="d-flex align-items-center gap-3">
            <img src="wireless.png" class="item-image" alt="item" />
            <div>
              <h3 class="h6 mb-0 fw-bold">Wireless Headphones</h3>
              <span class="small text-muted">Qty: 1</span>
            </div>
          </div>
          <span class="price-tag">$79</span>
        </div>

        <div class="item-card">
          <div class="d-flex align-items-center gap-3">
            <img src="homestand.jpg" class="item-image" alt="item" />
            <div>
              <h3 class="h6 mb-0 fw-bold">Phone Stand</h3>
              <span class="small text-muted">Qty: 2</span>
            </div>
          </div>
          <span class="price-tag">$24</span>
        </div>

        <div class="total-row">
          <span class="total-label">TOTAL:</span>
          <span class="total-amount">$103</span>
        </div>
      </section>

      <section class="content-card mb-4">
        <h2 class="h6 fw-bold mb-3 text-uppercase" style="letter-spacing: 1px">
          Payment Method
        </h2>
        <div class="form-check mb-2">
          <input
            class="form-check-input"
            type="radio"
            name="pay"
            id="p1"
            checked
          />
          <label class="form-check-label fw-bold" for="p1"
            >💳 Credit Card</label
          >
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="radio" name="pay" id="p2" />
          <label class="form-check-label fw-bold" for="p2">📱 E-Wallet</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="pay" id="p3" />
          <label class="form-check-label fw-bold" for="p3"
            >🚚 Cash on Delivery</label
          >
        </div>
      </section>

      <button class="btn btn-brand">Place Order Now</button>
    </main>
  </body>
</html>
